name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

      - name: Install Playwright browsers
        run: node_modules/@playwright/test/cli.js install --with-deps chromium

      - name: Run system tests
        run: node_modules/@playwright/test/cli.js test
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run system tests
        run: npx playwright test

deploy:
    needs: test
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Deploy backend to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Deploy frontend to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}